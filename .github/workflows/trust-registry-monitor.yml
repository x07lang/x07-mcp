name: Trust Registry Transparency Monitor

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

permissions:
  contents: read

env:
  X07_TOOLCHAIN_TAG: "v0.1.108"
  X07_TOOLCHAIN_TARBALL_LINUX_X64: "x07-0.1.108-x86_64-unknown-linux-gnu.tar.gz"

jobs:
  monitor:
    name: monitor / trust-tlog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout x07-mcp
        uses: actions/checkout@v4
        with:
          path: x07-mcp
      - name: Checkout x07 (local deps)
        uses: actions/checkout@v4
        with:
          repository: x07lang/x07
          ref: ${{ env.X07_TOOLCHAIN_TAG }}
          path: x07
      - name: Install system deps
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libcurl4-openssl-dev
      - name: Cache X07 toolchain
        uses: actions/cache@v4
        with:
          path: ~/.x07
          key: x07-${{ runner.os }}-${{ env.X07_TOOLCHAIN_TAG }}
      - name: Install X07 (pinned)
        shell: bash
        working-directory: x07-mcp
        run: X07_TOOLCHAIN_SOURCE_DIR="$(./scripts/ci/resolve_workspace_x07_root.sh)" ./scripts/ci/install_x07_toolchain.sh
      - name: Run trust-tlog monitor scenarios
        shell: bash
        working-directory: x07-mcp
        run: ./scripts/conformance/run_trust_tlog_scenarios.sh
      - name: Upload trust-tlog audit outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trust-tlog-monitor-audit
          path: |
            x07-mcp/packages/app/x07-mcp/*/tests/.tmp/app_tlog_monitor_ok/audit.jsonl
            x07-mcp/packages/app/x07-mcp/*/tests/.tmp/app_tlog_monitor_unexpected/audit.jsonl
            x07-mcp/packages/app/x07-mcp/*/tests/.tmp/app_tlog_monitor_inconsistent/audit.jsonl
          if-no-files-found: ignore
