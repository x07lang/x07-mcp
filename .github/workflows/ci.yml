name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  X07_MCP_LOCK_RETRIES: "5"
  X07_MCP_LOCK_RETRY_DELAY_SECS: "3"
  X07_TOOLCHAIN_TAG: "v0.1.77"
  X07_TOOLCHAIN_TARBALL_LINUX_X64: "x07-0.1.77-x86_64-unknown-linux-gnu.tar.gz"

jobs:
  check:
    name: ci / check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout x07-mcp
        uses: actions/checkout@v4
        with:
          path: x07-mcp
      - name: Checkout x07 (local deps)
        uses: actions/checkout@v4
        with:
          repository: x07lang/x07
          ref: ${{ env.X07_TOOLCHAIN_TAG }}
          path: x07
      - name: Install system deps
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cbmc \
            clang \
            build-essential \
            pkg-config \
            libssl-dev \
            libcurl4-openssl-dev \
            liblzma-dev \
            zlib1g-dev \
            libsqlite3-dev \
            z3
      - name: Cache X07 toolchain
        uses: actions/cache@v4
        with:
          path: ~/.x07
          key: x07-${{ runner.os }}-${{ env.X07_TOOLCHAIN_TAG }}
      - name: Install X07 (pinned)
        shell: bash
        working-directory: x07-mcp
        run: ./scripts/ci/install_x07_toolchain.sh
      - name: Check
        shell: bash
        working-directory: x07-mcp
        run: X07_MCP_LOCAL_DEPS=1 ./scripts/ci/check_all.sh

  registry-fixtures:
    name: ci / registry-fixtures
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install system deps
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libcurl4-openssl-dev
      - name: Cache X07 toolchain
        uses: actions/cache@v4
        with:
          path: ~/.x07
          key: x07-${{ runner.os }}-${{ env.X07_TOOLCHAIN_TAG }}
      - name: Install X07 (pinned)
        shell: bash
        run: ./scripts/ci/install_x07_toolchain.sh
      - name: Validate fixtures
        shell: bash
        run: ./registry/scripts/check_fixtures.sh

  verified-core-auth-dogfood:
    name: ci / verified-core-auth-dogfood
    runs-on: ubuntu-latest
    steps:
      - name: Checkout x07-mcp
        uses: actions/checkout@v4
        with:
          path: x07-mcp
      - name: Checkout x07 (source)
        uses: actions/checkout@v4
        with:
          repository: x07lang/x07
          ref: main
          path: x07
      - name: Install system deps
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libcurl4-openssl-dev
      - name: Build x07 (source)
        shell: bash
        working-directory: x07
        run: cargo build -p x07 -p x07-host-runner
      - name: Verify published auth-core example
        shell: bash
        working-directory: x07-mcp
        run: PATH="$PWD/../x07/target/debug:$PATH" ./scripts/ci/check_verified_core_pure_auth_core_example.sh

  mcp-trust-tests:
    name: ci / mcp-trust-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout x07-mcp
        uses: actions/checkout@v4
        with:
          path: x07-mcp
      - name: Checkout x07 (local deps)
        uses: actions/checkout@v4
        with:
          repository: x07lang/x07
          ref: ${{ env.X07_TOOLCHAIN_TAG }}
          path: x07
      - name: Install system deps
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libcurl4-openssl-dev
      - name: Cache X07 toolchain
        uses: actions/cache@v4
        with:
          path: ~/.x07
          key: x07-${{ runner.os }}-${{ env.X07_TOOLCHAIN_TAG }}
      - name: Install X07 (pinned)
        shell: bash
        working-directory: x07-mcp
        run: ./scripts/ci/install_x07_toolchain.sh
      - name: Unit tests (ext-mcp-trust@0.5.0)
        shell: bash
        working-directory: x07-mcp
        run: |
          x07_root="$(cd ../x07 && pwd)"
          (
            cd packages/ext/x07-ext-mcp-trust/0.5.0
            x07 test \
              --manifest tests/tests.json \
              --module-root modules \
              --module-root "$x07_root/packages/ext/x07-ext-base64-rs/0.1.4/modules" \
              --module-root "$x07_root/packages/ext/x07-ext-crypto-rs/0.1.5/modules" \
              --module-root "$x07_root/packages/ext/x07-ext-data-model/0.1.10/modules" \
              --module-root "$x07_root/packages/ext/x07-ext-hex-rs/0.1.4/modules" \
              --module-root "$x07_root/packages/ext/x07-ext-json-rs/0.1.6/modules" \
              --module-root "$x07_root/packages/ext/x07-ext-url-rs/0.1.4/modules" \
              --module-root "$x07_root/packages/ext/x07-ext-fs/0.1.5/modules" \
              --module-root "$x07_root/packages/ext/x07-ext-unicode-rs/0.1.5/modules"
          )
      - name: Unit tests (ext-mcp-trust-os@0.5.0)
        shell: bash
        working-directory: x07-mcp
        run: |
          x07_root="$(cd ../x07 && pwd)"
          trust_modules="$PWD/packages/ext/x07-ext-mcp-trust/0.5.0/modules"
          (
            cd packages/ext/x07-ext-mcp-trust-os/0.5.0
            x07 test \
              --manifest tests/tests.json \
              --module-root modules \
              --module-root "$trust_modules" \
              --module-root "$x07_root/packages/ext/x07-ext-base64-rs/0.1.4/modules" \
              --module-root "$x07_root/packages/ext/x07-ext-net/0.1.9/modules" \
              --module-root "$x07_root/packages/ext/x07-ext-url-rs/0.1.4/modules" \
              --module-root "$x07_root/packages/ext/x07-ext-json-rs/0.1.6/modules" \
              --module-root "$x07_root/packages/ext/x07-ext-data-model/0.1.10/modules" \
              --module-root "$x07_root/packages/ext/x07-ext-crypto-rs/0.1.5/modules" \
              --module-root "$x07_root/packages/ext/x07-ext-hex-rs/0.1.4/modules" \
              --module-root "$x07_root/packages/ext/x07-ext-fs/0.1.5/modules" \
              --module-root "$x07_root/packages/ext/x07-ext-unicode-rs/0.1.5/modules" \
              --module-root "$x07_root/packages/ext/x07-ext-curl-c/0.1.6/modules"
          )
      - name: Unit tests (x07-mcp@0.4.0)
        shell: bash
        working-directory: x07-mcp
        run: |
          x07_root="$(cd ../x07 && pwd)"
          trust_modules="$PWD/packages/ext/x07-ext-mcp-trust/0.5.0/modules"
          trust_os_modules="$PWD/packages/ext/x07-ext-mcp-trust-os/0.5.0/modules"
          (
            cd packages/app/x07-mcp/0.4.0
            x07 test \
              --manifest tests/tests.json \
              --module-root modules \
              --module-root "$trust_modules" \
              --module-root "$trust_os_modules" \
              --module-root "$x07_root/packages/ext/x07-ext-base64-rs/0.1.4/modules" \
              --module-root "$x07_root/packages/ext/x07-ext-net/0.1.9/modules" \
              --module-root "$x07_root/packages/ext/x07-ext-url-rs/0.1.4/modules" \
              --module-root "$x07_root/packages/ext/x07-ext-json-rs/0.1.6/modules" \
              --module-root "$x07_root/packages/ext/x07-ext-data-model/0.1.10/modules" \
              --module-root "$x07_root/packages/ext/x07-ext-crypto-rs/0.1.5/modules" \
              --module-root "$x07_root/packages/ext/x07-ext-hex-rs/0.1.4/modules" \
              --module-root "$x07_root/packages/ext/x07-ext-fs/0.1.5/modules" \
              --module-root "$x07_root/packages/ext/x07-ext-unicode-rs/0.1.5/modules" \
              --module-root "$x07_root/packages/ext/x07-ext-curl-c/0.1.6/modules"
          )
      - name: Trust tlog conformance scenarios
        shell: bash
        working-directory: x07-mcp
        run: |
          X07_ROOT="$PWD/../x07" ./scripts/conformance/run_trust_tlog_scenarios.sh
      - name: Publish dry-run (template trust)
        shell: bash
        working-directory: x07-mcp
        run: |
          mkdir -p .agent_cache/trust-framework
          printf 'template-mcpb-fixture\n' > .agent_cache/trust-framework/template-http.mcpb
          ./scripts/ci/hydrate_root_deps.sh
          x07 bundle --project x07.json --profile os --out dist/x07-mcp --json=off
          ./dist/x07-mcp registry gen \
            --in templates/mcp-server-http/x07.mcp.json \
            --out .agent_cache/trust-framework/template.server.json \
            --mcpb .agent_cache/trust-framework/template-http.mcpb \
            --schema registry/schema/server.schema.2025-12-11.json \
            --machine json \
            >/dev/null
          ./dist/x07-mcp publish --dry-run \
            --server-json .agent_cache/trust-framework/template.server.json \
            --mcpb .agent_cache/trust-framework/template-http.mcpb \
            --machine json \
            >/dev/null

  template-mcp-server-http-tests:
    name: ci / template-mcp-server-http-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Guard template runtime secrets
        shell: bash
        run: ./scripts/ci/check_no_template_runtime_secrets.sh
      - name: Install system deps
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libcurl4-openssl-dev
      - name: Cache X07 toolchain
        uses: actions/cache@v4
        with:
          path: ~/.x07
          key: x07-${{ runner.os }}-${{ env.X07_TOOLCHAIN_TAG }}
      - name: Install X07 (pinned)
        shell: bash
        run: ./scripts/ci/install_x07_toolchain.sh
      - name: Hydrate template deps
        shell: bash
        run: |
          X07_WORKSPACE_ROOT="$PWD" ./scripts/ci/materialize_patch_deps.sh templates/mcp-server-http/x07.json >/dev/null
          X07_WORKSPACE_ROOT="$PWD" ./scripts/ci/hydrate_project_deps.sh templates/mcp-server-http/x07.json
      - name: Template replay tests (mcp-server-http)
        shell: bash
        run: |
          (
            cd templates/mcp-server-http
            x07 test --manifest tests/tests.json --json=off >/dev/null
          )

  publish-dry-run:
    name: ci / publish-dry-run / ${{ matrix.server_id }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        server_id:
          - github-mcp
          - slack-mcp
          - jira-mcp
          - postgres-mcp
          - redis-mcp
          - s3-mcp
          - kubernetes-mcp
          - stripe-mcp
          - smtp-mcp
          - http-proxy-mcp
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install system deps
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libcurl4-openssl-dev
      - name: Cache X07 toolchain
        uses: actions/cache@v4
        with:
          path: ~/.x07
          key: x07-${{ runner.os }}-${{ env.X07_TOOLCHAIN_TAG }}
      - name: Install X07 (pinned)
        shell: bash
        run: ./scripts/ci/install_x07_toolchain.sh
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build x07-mcp CLI
        shell: bash
        run: |
          ./scripts/ci/hydrate_root_deps.sh
          x07 bundle --project x07.json --profile os --out dist/x07-mcp --json=off
      - name: Build MCPB and validate publish dry-run
        shell: bash
        run: |
          server_id="${{ matrix.server_id }}"
          ./servers/_shared/ci/install_server_deps.sh "./servers/${server_id}"
          "./servers/${server_id}/publish/build_mcpb.sh"
          ./dist/x07-mcp registry gen \
            --in "servers/${server_id}/x07.mcp.json" \
            --out "servers/${server_id}/dist/server.json" \
            --mcpb "servers/${server_id}/dist/${server_id}.mcpb" \
            --schema registry/schema/server.schema.2025-12-11.json \
            --machine json \
            >/dev/null
          ./dist/x07-mcp publish --dry-run \
            --server-json "servers/${server_id}/dist/server.json" \
            --mcpb "servers/${server_id}/dist/${server_id}.mcpb" \
            --machine json \
            >/dev/null
      - name: Check deterministic MCPB hash
        if: matrix.server_id == 'postgres-mcp'
        shell: bash
        run: |
          first="$(cat servers/postgres-mcp/dist/postgres-mcp.mcpb.sha256.txt)"
          rm -f servers/postgres-mcp/dist/postgres-mcp.mcpb servers/postgres-mcp/dist/postgres-mcp.mcpb.sha256.txt
          ./servers/postgres-mcp/publish/build_mcpb.sh
          second="$(cat servers/postgres-mcp/dist/postgres-mcp.mcpb.sha256.txt)"
          test "${first}" = "${second}"
      - name: Upload publish metadata
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-${{ matrix.server_id }}
          path: |
            servers/${{ matrix.server_id }}/dist/server.json
            servers/${{ matrix.server_id }}/dist/${{ matrix.server_id }}.mcpb.sha256.txt
          if-no-files-found: error

  release-metadata-guard:
    name: ci / release-metadata-guard
    runs-on: ubuntu-latest
    needs: [publish-dry-run]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download publish metadata artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: publish-*
          path: .agent_cache/release-metadata
      - name: Guard against placeholder hashes
        shell: bash
        run: ./registry/scripts/release_metadata_guard.sh .agent_cache/release-metadata
      - name: Guard against test_fixed_nonce
        shell: bash
        run: ./scripts/ci/release_guard_no_test_fixed_nonce.sh

  conformance-server:
    name: ci / conformance / ${{ matrix.server_id }} / ${{ matrix.mode }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        server_id:
          - postgres-mcp
        mode: [noauth]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install system deps
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libcurl4-openssl-dev
      - name: Cache X07 toolchain
        uses: actions/cache@v4
        with:
          path: ~/.x07
          key: x07-${{ runner.os }}-${{ env.X07_TOOLCHAIN_TAG }}
      - name: Install X07 (pinned)
        shell: bash
        run: ./scripts/ci/install_x07_toolchain.sh
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run conformance
        shell: bash
        run: |
          ./conformance/run_server_conformance.sh \
            --baseline ./conformance/conformance-baseline.yml \
            --spawn "${{ matrix.server_id }}" \
            --mode "${{ matrix.mode }}" \
            --results-dir "./conformance/results/${{ matrix.server_id }}-${{ matrix.mode }}"
      - name: Upload conformance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-${{ matrix.server_id }}-${{ matrix.mode }}
          path: conformance/results/${{ matrix.server_id }}-${{ matrix.mode }}/**/checks*.json
          if-no-files-found: ignore

  conformance-client-auth:
    name: ci / conformance-client / auth
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install system deps
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libcurl4-openssl-dev
      - name: Cache X07 toolchain
        uses: actions/cache@v4
        with:
          path: ~/.x07
          key: x07-${{ runner.os }}-${{ env.X07_TOOLCHAIN_TAG }}
      - name: Install X07 (pinned)
        shell: bash
        run: ./scripts/ci/install_x07_toolchain.sh
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build conformance client
        shell: bash
        env:
          X07_WORKSPACE_ROOT: ${{ github.workspace }}
        run: |
          ./scripts/ci/hydrate_project_deps.sh conformance/client-x07/x07.json
          x07 bundle --project conformance/client-x07/x07.json --profile os --out dist/x07-mcp-conformance-client --json=off
      - name: Run conformance (client/auth)
        shell: bash
        run: |
          npx -y @modelcontextprotocol/conformance@0.1.14 client \
            --command "./dist/x07-mcp-conformance-client" \
            --suite auth

  conformance-client-auth-prm-multi-as:
    name: ci / conformance-client-auth-prm-multi-as
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install system deps
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libcurl4-openssl-dev
      - name: Cache X07 toolchain
        uses: actions/cache@v4
        with:
          path: ~/.x07
          key: x07-${{ runner.os }}-${{ env.X07_TOOLCHAIN_TAG }}
      - name: Install X07 (pinned)
        shell: bash
        run: ./scripts/ci/install_x07_toolchain.sh
      - name: Run conformance scenario (client auth multi-as)
        shell: bash
        run: ./scripts/conformance/run_client_auth_scenario.sh prm-multi-as-select-prefer-order
