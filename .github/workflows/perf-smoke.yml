name: Perf Smoke

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

env:
  X07_MCP_LOCK_RETRIES: "5"
  X07_MCP_LOCK_RETRY_DELAY_SECS: "3"
  X07_TOOLCHAIN_TAG: "v0.1.83"
  X07_TOOLCHAIN_TARBALL_LINUX_X64: "x07-0.1.83-x86_64-unknown-linux-gnu.tar.gz"
  X07_MCP_PERF_SEQ_CALLS: "200"
  X07_MCP_PERF_CONC_CALLS: "50"

jobs:
  perf-smoke:
    name: ci / perf-smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout x07-mcp
        uses: actions/checkout@v4
        with:
          path: x07-mcp
      - name: Checkout x07 (local deps)
        uses: actions/checkout@v4
        with:
          repository: x07lang/x07
          ref: ${{ env.X07_TOOLCHAIN_TAG }}
          path: x07
      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Install system deps
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            build-essential \
            pkg-config \
            libssl-dev \
            libcurl4-openssl-dev \
            liblzma-dev \
            zlib1g-dev \
            libsqlite3-dev \
            jq \
            curl
      - name: Install X07 (pinned)
        shell: bash
        working-directory: x07-mcp
        run: X07_TOOLCHAIN_SOURCE_DIR="$(./scripts/ci/resolve_workspace_x07_root.sh)" ./scripts/ci/install_x07_toolchain.sh
      - name: Perf smoke (full gate)
        shell: bash
        working-directory: x07-mcp
        run: X07_MCP_LOCAL_DEPS=1 X07_MCP_PERF_SMOKE=1 ./scripts/ci/check_all.sh
